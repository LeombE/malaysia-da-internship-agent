target:
  desired_start: "2026-08-02"
  desired_end: "2026-11-03"
  min_duration_months: 3
  accept_longer_duration: true
  country: "Malaysia"

  # Realistic priority for your situation: Johor first, then offer density in Selangor/KL, then Penang.
  preferred_states:
    - "Johor"
    - "Selangor"
    - "Kuala Lumpur"
    - "Penang"

  location_weights:
    Johor: 16
    Selangor: 14
    Kuala Lumpur: 13
    Penang: 11
    Malaysia: 6

  preferred_cities:
    Johor Bahru: 4
    Iskandar Puteri: 4
    Nusajaya: 3
    Senai: 3
    Kulai: 3
    Pasir Gudang: 2
    Petaling Jaya: 4
    Subang Jaya: 4
    Shah Alam: 4
    Puchong: 3
    Cyberjaya: 3
    Klang: 2
    Bangsar South: 4
    Kuala Lumpur: 4
    George Town: 4
    Bayan Lepas: 4
    Bukit Mertajam: 2

strategy:
  # Buckets used in CSV/tracker.
  immediate_apply_min_score: 70
  apply_soon_min_score: 55
  mass_apply_min_score: 42
  tracker_min_score: 38
  salary_weight: low
  priority_goal: "maximize real internship offer probability for Aug-Nov 2026 industrial training"

