# V3 15-day urgent campaign strategy:
# - Target 4 scheduled runs/day and JSEARCH_MAX_REQUESTS_PER_RUN=160 for 15 days.
# - Expected automatic usage: 4 * 160 * 15 = 9,600 JSearch requests.
# - This leaves about 400 requests from the 10,000/month Pro plan for manual validation/debug.
# - Keep JSEARCH_API_KEY in .env/GitHub Secrets; only the request cap changes outside this file.
# - src/sources/jsearch.py clamps this campaign at 160 requests/run until strategy.urgent_campaign.ends_before.
# - Query groups G1-G7 are interleaved before rotation so each run mixes high-intent,
#   company-targeted, local Malay, and Malaysia-wide backup searches.
